name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Push to cPanel git remote to trigger auto-deploy
        env:
          CPANEL_SSH_PASSWORD: ${{ secrets.CPANEL_SSH_PASSWORD }}
        run: |
          if [ -z "$CPANEL_SSH_PASSWORD" ]; then
            echo "::error::CPANEL_SSH_PASSWORD secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          mkdir -p ~/.ssh
          ssh-keyscan -p 21098 server402.web-hosting.com >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="sshpass -p \"$CPANEL_SSH_PASSWORD\" ssh -p 21098 -o StrictHostKeyChecking=accept-new"

          # Pushing directly to the cPanel-hosted git repo (rather than using
          # cPanel's UAPI to trigger a pull) because that UAPI path was
          # unreliable: repeated retriggers left the server-side repo stuck
          # on a stale commit despite the API reporting success. A direct
          # push, on the other hand, hits cPanel's built-in Git Version
          # Control post-receive hook directly, which reliably runs
          # .cpanel.yml on every push - this is the exact method used to
          # manually recover the last two deploys.
          git push "ssh://mindipus@server402.web-hosting.com/home/mindipus/repositories/latest-mindova" "HEAD:main"
